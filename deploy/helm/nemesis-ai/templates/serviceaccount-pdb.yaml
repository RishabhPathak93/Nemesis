{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "nemesis-ai.serviceAccountName" . }}
  labels:
    {{- include "nemesis-ai.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "nemesis-ai.fullname" . }}-server
  labels:
    {{- include "nemesis-ai.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "nemesis-ai.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "server") | nindent 6 }}
{{- end }}
---
{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nemesis-ai.fullname" . }}-server
  labels:
    {{- include "nemesis-ai.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nemesis-ai.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "server") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        {{- range .Values.networkPolicy.egressAllowedPorts }}
        - protocol: TCP
          port: {{ . }}
        {{- end }}
{{- end }}
---
{{- if .Values.observability.prometheusServiceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "nemesis-ai.fullname" . }}-server
  {{- if .Values.observability.prometheusServiceMonitor.namespace }}
  namespace: {{ .Values.observability.prometheusServiceMonitor.namespace }}
  {{- end }}
  labels:
    {{- include "nemesis-ai.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "nemesis-ai.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "server") | nindent 6 }}
  endpoints:
    - path: /metrics
      interval: {{ .Values.observability.prometheusServiceMonitor.interval }}
      port: http
      {{- if .Values.observability.prometheusServiceMonitor.metricsToken }}
      bearerTokenSecret:
        name: {{ .Values.appSecrets.name }}
        key: METRICS_TOKEN
      {{- end }}
{{- end }}
