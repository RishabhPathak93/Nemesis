apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nemesis-ai.fullname" . }}-server
  labels:
    {{- include "nemesis-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.replicaCount.server }}
  selector:
    matchLabels:
      {{- include "nemesis-ai.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "server") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nemesis-ai.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "server") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "nemesis-ai.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: server
          image: "{{ .Values.image.server.repository }}:{{ .Values.image.server.tag }}"
          imagePullPolicy: {{ .Values.image.server.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: PORT
              value: "3001"
            - name: NODE_ENV
              value: "production"
            - name: COOKIE_SECURE
              value: {{ .Values.features.cookieSecure | quote }}
            - name: RATE_LIMIT_REDIS
              value: {{ .Values.features.rateLimitRedis | quote }}
            - name: CV_DETECTOR_PIPELINE
              value: {{ .Values.features.detectorPipeline | quote }}
            - name: CV_BRANDING_DIR
              value: {{ .Values.persistence.branding.mountPath | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalServices.databaseUrlSecret }}
                  key: {{ .Values.externalServices.databaseUrlKey }}
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.externalServices.redisUrlSecret }}
                  key: {{ .Values.externalServices.redisUrlKey }}
            {{- range .Values.appSecrets.keys }}
            - name: {{ . }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.appSecrets.name }}
                  key: {{ . }}
            {{- end }}
            {{- range .Values.appSecrets.optionalKeys }}
            - name: {{ . }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.appSecrets.name }}
                  key: {{ . }}
                  optional: true
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
              {{- with .Values.probes.readiness.httpHeaders }}
              httpHeaders:
                {{- toYaml . | nindent 16 }}
              {{- end }}
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources.server | nindent 12 }}
          {{- if .Values.persistence.branding.enabled }}
          volumeMounts:
            - name: branding
              mountPath: {{ .Values.persistence.branding.mountPath }}
          {{- end }}
      {{- if .Values.persistence.branding.enabled }}
      volumes:
        - name: branding
          persistentVolumeClaim:
            claimName: {{ include "nemesis-ai.fullname" . }}-branding
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nemesis-ai.fullname" . }}-server
  labels:
    {{- include "nemesis-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: http
      name: http
  selector:
    {{- include "nemesis-ai.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "server") | nindent 4 }}
