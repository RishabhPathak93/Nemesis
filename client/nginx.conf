server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # NEM-2026-019: suppress the `Server: nginx/<version>` response header so we
    # don't broadcast the upstream version to recon scanners.
    server_tokens off;
    # NEM-2026-029: scrub Via/X-Powered-By in case any upstream proxy adds them.
    proxy_hide_header Server;
    proxy_hide_header Via;
    proxy_hide_header X-Powered-By;

    # Security headers (HSTS, CSP, X-Frame-Options, X-Content-Type-Options,
    # Referrer-Policy, Permissions-Policy) are emitted by the public-facing
    # Caddy edge proxy. Do not duplicate them here.

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long cache for hashed Vite assets.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API + health to the server container.
    location /api/ {
        proxy_pass http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    location = /health {
        proxy_pass http://server:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # SPA fallback — every unknown route returns index.html so React Router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
