# Replace these placeholder values before applying.
#
# Generate fresh secrets with:
#   JWT_SECRET=$(openssl rand -hex 48)
#   ENCRYPTION_KEY=$(openssl rand -hex 32)
#   HEALTH_TOKEN=$(openssl rand -hex 16)
#   POSTGRES_PASSWORD=$(openssl rand -hex 24)
#
# For production, replace this file with a SealedSecret, ExternalSecret, or
# `kubectl create secret generic ...` reference.
apiVersion: v1
kind: Secret
metadata:
  name: nemesis-ai-secrets
type: Opaque
stringData:
  # Required — replace
  JWT_SECRET: "REPLACE_ME_with_openssl_rand_hex_48"
  ENCRYPTION_KEY: "REPLACE_ME_with_openssl_rand_hex_32"
  POSTGRES_PASSWORD: "REPLACE_ME_with_openssl_rand_hex_24"
  HEALTH_TOKEN: "REPLACE_ME_with_openssl_rand_hex_16"

  # LLM — set at least one provider (or leave blank to configure per-org via Settings)
  LLM_PROVIDER: ""
  LLM_API_KEY: ""
  LLM_MODEL: ""
  LLM_BASE_URL: ""

  ANTHROPIC_API_KEY: ""
  ANTHROPIC_MODEL: "claude-opus-4-7"

  # Optional — web research
  SEARCH_PROVIDER: ""
  TAVILY_API_KEY: ""
  BRAVE_SEARCH_API_KEY: ""

  # Optional — SMTP for transactional email
  SMTP_HOST: ""
  SMTP_PORT: "587"
  SMTP_USER: ""
  SMTP_PASS: ""
  SMTP_FROM: ""

  # Optional — observability
  SENTRY_DSN: ""
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  METRICS_TOKEN: ""
