apiVersion: v1
kind: Service
metadata:
  name: nemesis-client
  labels:
    app.kubernetes.io/name: nemesis-ai-client
spec:
  selector:
    app.kubernetes.io/name: nemesis-ai-client
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemesis-client
  labels:
    app.kubernetes.io/name: nemesis-ai-client
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nemesis-ai-client
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nemesis-ai-client
    spec:
      containers:
        - name: client
          # Replace with your registry-hosted image, e.g. ghcr.io/your-org/nemesis-ai-client:v1.0.0
          image: nemesis-ai-client:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: http }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 256Mi }
