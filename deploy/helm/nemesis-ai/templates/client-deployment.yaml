apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nemesis-ai.fullname" . }}-client
  labels:
    {{- include "nemesis-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: client
spec:
  replicas: {{ .Values.replicaCount.client }}
  selector:
    matchLabels:
      {{- include "nemesis-ai.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "client") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "nemesis-ai.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "client") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "nemesis-ai.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 101                # nginx default
      containers:
        - name: client
          image: "{{ .Values.image.client.repository }}:{{ .Values.image.client.tag }}"
          imagePullPolicy: {{ .Values.image.client.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources.client | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nemesis-ai.fullname" . }}-client
  labels:
    {{- include "nemesis-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: client
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      name: http
  selector:
    {{- include "nemesis-ai.selectorLabels" (dict "Release" .Release "Chart" .Chart "Values" .Values "component" "client") | nindent 4 }}
