{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "nemesis-ai.fullname" . }}
  labels:
    {{- include "nemesis-ai.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq .service "server" }}
                name: {{ include "nemesis-ai.fullname" $ }}-server
                port:
                  number: 3001
                {{- else }}
                name: {{ include "nemesis-ai.fullname" $ }}-client
                port:
                  number: 8080
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
